name: Aegis Upstream Sync & Registry Publish

on:
  schedule:
    # Run automatically every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

# THE FIX: Force GitHub to use the upgraded Node 24 runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# CRITICAL: We need id-token: write so the MCP Publisher can use OIDC to authenticate
permissions:
  contents: write
  id-token: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Aegis Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Upstream (CrystalDBA)
        run: |
          git remote add upstream https://github.com/crystaldba/postgres-mcp.git
          git fetch upstream
          # Merge upstream main, always prioritizing our Aegis files (README, docker-compose, server.json) on conflict
          git merge upstream/main -X ours --allow-unrelated-histories -m "chore: automated upstream sync from CrystalDBA"
          git push origin main

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: false # THE FIX: Disables the go.sum cache warning

      - name: Install MCP Publisher CLI
        run: |
          git clone https://github.com/modelcontextprotocol/registry.git /tmp/registry
          cd /tmp/registry
          make publisher
          mv bin/mcp-publisher /usr/local/bin/

      - name: Publish to Global Registry via OIDC
        run: |
          # The CLI will natively detect the GitHub Actions environment and use OIDC
          mcp-publisher login github-actions
          
          # THE FIX: Run the publish command, but don't crash the workflow if it fails 
          # (e.g., if the version 1.0.3 already exists on the registry)
          mcp-publisher publish --server-url https://github.com/Yash-0620/postgres-mcp || echo "Publishing skipped: Version likely already exists on the global registry."
