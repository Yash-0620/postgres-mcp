name: Aegis Upstream Sync & Registry Publish

on:
  schedule:
    # Run automatically every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

# CRITICAL: We need id-token: write so the MCP Publisher can use OIDC to authenticate
permissions:
  contents: write
  id-token: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Aegis Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Upstream (CrystalDBA)
        run: |
          git remote add upstream https://github.com/crystaldba/postgres-mcp.git
          git fetch upstream
          # Merge upstream main, always prioritizing our Aegis files (README, docker-compose, server.json) on conflict
          git merge upstream/main -X ours --allow-unrelated-histories -m "chore: automated upstream sync from CrystalDBA"
          git push origin main

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install MCP Publisher CLI
        run: |
          git clone https://github.com/modelcontextprotocol/registry.git /tmp/registry
          cd /tmp/registry
          make publisher
          mv bin/mcp-publisher /usr/local/bin/

      - name: Sync Upstream (CrystalDBA)
        run: |
          # Enforce strict error handling to catch fatal merge conflicts immediately
          set -euo pipefail

          # Map the upstream repository
          git remote add upstream https://github.com/crystaldba/postgres-mcp.git

          # Fetch the absolute latest state of our remote fork
          git fetch origin main

          # CRITICAL FIX: Force the runner to explicitly attach to and track origin/main
          # This aligns the CI runner's timeline with the remote and clears the non-fast-forward error
          git checkout -B main origin/main

          # Fetch the latest updates from the upstream creators
          git fetch upstream

          # Merge the upstream updates into our fork. 
          # -X ours ensures our weaponized files (server.json, docker-compose.yml) overwrite their defaults.
          git merge upstream/main -X ours --allow-unrelated-histories -m "chore: automated upstream sync maintaining Aegis infrastructure"

          # Push the synchronized code to our fork safely.
          git push --force-with-lease origin main
