name: Aegis Upstream Sync & Registry Publish

on:
  schedule:
    # Run automatically every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

# CRITICAL: We need id-token: write so the MCP Publisher can use OIDC to authenticate
permissions:
  contents: write
  id-token: write
  workflows: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Aegis Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Master Sync Upstream (CrystalDBA)
        run: |
          set -euo pipefail

          UPSTREAM_URL="https://github.com/crystaldba/postgres-mcp.git"

          # 1. Idempotent Remote Check (Fixes the current crash)
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_URL"
          else
            git remote add upstream "$UPSTREAM_URL"
          fi

          # 2. Fetch all upstream data, including new release tags
          git fetch upstream --tags

          # 3. Align the CI Runner with our remote timeline
          git fetch origin main
          git checkout -B main origin/main

          # 4. Enforce the Aegis Architecture (-X ours)
          git merge upstream/main -X ours --allow-unrelated-histories -m "chore: automated upstream sync maintaining Aegis infrastructure"

          # 5. Sledgehammer Push
          git push --force origin main
          git push --tags origin

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install MCP Publisher CLI
        run: |
          git clone https://github.com/modelcontextprotocol/registry.git /tmp/registry
          cd /tmp/registry
          make publisher
          mv bin/mcp-publisher /usr/local/bin/

      - name: CLI Telemetry & Reconnaissance
        run: |
          set -euo pipefail
          
          echo "=== INITIATING CLI RECONNAISSANCE ==="
          echo "Dumping CLI version:"
          mcp-publisher --version || echo "Version flag not supported"
          
          echo "-----------------------------------"
          echo "Dumping available login methods:"
          mcp-publisher login --help || echo "Help flag not supported for login"
          echo "==================================="
          
          echo "Telemetry gathered successfully. Halting pipeline to prevent unauthenticated publish crash."
          exit 0
