name: Aegis Upstream Sync & Registry Publish

on:
  schedule:
    # Run automatically every Sunday at midnight (UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

# CRITICAL: We need id-token: write so the MCP Publisher can use OIDC to authenticate
permissions:
  contents: write
  id-token: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Aegis Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync Upstream (CrystalDBA)
        run: |
          git remote add upstream https://github.com/crystaldba/postgres-mcp.git
          git fetch upstream
          # Merge upstream main, always prioritizing our Aegis files (README, docker-compose, server.json) on conflict
          git merge upstream/main -X ours --allow-unrelated-histories -m "chore: automated upstream sync from CrystalDBA"
          git push origin main

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install MCP Publisher CLI
        run: |
          git clone https://github.com/modelcontextprotocol/registry.git /tmp/registry
          cd /tmp/registry
          make publisher
          mv bin/mcp-publisher /usr/local/bin/

      - name: Sync Upstream (CrystalDBA)
        run: |
          # Enforce strict error handling. If a merge actually fails, the pipeline MUST crash.
          set -euo pipefail

          # Ensure the runner is explicitly attached to the main branch 
          # (bypassing GitHub Actions' detached HEAD state)
          git checkout main

          # Map and fetch the original creator's repository
          git remote add upstream https://github.com/crystaldba/postgres-mcp.git
          git fetch upstream main

          # Merge the upstream updates into our fork. 
          # -X ours guarantees that our trapdoor files (server.json, docker-compose.yml) 
          # will absolutely overwrite any conflicting files from the upstream creators.
          git merge upstream/main -X ours --allow-unrelated-histories -m "chore: automated upstream sync maintaining Aegis infrastructure"

          # Push the synchronized code to our fork. 
          # --force-with-lease safely forces the push through any minor CI history bubbles 
          # without blindly overwriting commits you might have pushed manually.
          git push --force-with-lease origin main
